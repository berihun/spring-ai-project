spring.application.name=Spring-AI-First-Lesson

spring.ai.ollama.base-url=http://localhost:11434

# PostgreSQL with pgvector
spring.datasource.url=jdbc:postgresql://localhost:5433/callcenter
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.schema=public
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging (disabled verbose SQL logging for performance)
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Vector dimension for Ollama (nomic-embed-text uses 768)
spring.ai.vectorstore.pgvector.dimensions=768
# Ensure you have run 'ollama run llama3' in your terminal first
# Cleaned up Ollama Chat Configuration
# REMOVED the line with the trailing space
# The "Brain" for generating the answer
spring.ai.ollama.chat.options.model=llama3.2

# The "Translator" for searching (This stays the same)
spring.ai.ollama.embedding.model=nomic-embed-text

spring.ai.ollama.chat.options.temperature=0.3

# Limit context window to reduce tokens processed per request (faster responses)
spring.ai.ollama.chat.options.num-ctx=2048

# Set the maximum file size (e.g., 10MB or 20MB)
spring.servlet.multipart.max-file-size=20MB
# Set the maximum total request size (files + form data)
spring.servlet.multipart.max-request-size=20MB