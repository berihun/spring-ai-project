spring.application.name=Call-Advisor-Assistant

# --- Ollama Local Engine ---
spring.ai.ollama.base-url=http://localhost:11434
# RECOMMENDATION: Use llama3.2:1b for extreme speed on local PCs
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.chat.options.temperature=0.2
# Context window: 2048 is good for fast processing of PDF chunks
spring.ai.ollama.chat.options.num-ctx=2048

# --- Qdrant Vector Database (High Speed) ---
# Note: Ensure Docker is mapping 6334 (GRPC port) for the Spring AI starter
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=advisor_manuals
spring.ai.vectorstore.qdrant.use-tls=false

# --- Redis Caching (Instant answers for repeated queries) ---
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- File Upload Settings (Required for large PDF manuals) ---
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- Performance Logging ---
# Turn off Hibernate/SQL logs since we are no longer using Postgres
logging.level.org.hibernate=WARN
logging.level.org.springframework.jdbc=WARN
# Useful to see what Qdrant is doing
logging.level.org.springframework.ai.vectorstore.qdrant=INFO
# Add this line
spring.ai.vectorstore.qdrant.initialize-schema=true


spring.elasticsearch.uris=http://localhost:9200
# Important: Since we turned security off in Docker for local speed
spring.elasticsearch.username=
spring.elasticsearch.password=